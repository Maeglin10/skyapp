version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: skyapp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skyapp
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  skyapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skyapp-api
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/skyapp
      NODE_ENV: production
      PORT: 3000
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
