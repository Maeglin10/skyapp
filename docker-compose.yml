version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: skyapp
      POSTGRES_PASSWORD: skyapp
      POSTGRES_DB: skyapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skyapp']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # Uncomment to run the app in Docker (optional for development)
  # app:
  #   build: .
  #   ports:
  #     - '3000:3000'
  #   environment:
  #     NODE_ENV: development
  #   env_file:
  #     - .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  pgdata:
